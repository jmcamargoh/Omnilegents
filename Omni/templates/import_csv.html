{% extends 'base.html' %}

{% block contenido %}
    <h1>Import CSV</h1>
    {% if success %}
        <p>Data imported successfully!</p>
    {% endif %}
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" name="csv_file">
        <button type="submit">Import</button>
    </form>
{% endblock %}
